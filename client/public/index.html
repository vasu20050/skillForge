<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4F46E5" />
    <meta
      name="description"
      content="SkillForge - The premier campus-first peer skill marketplace. Master new skills, collaborate with peers, and build your portfolio."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Open Graph / Meta -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skillforge.campus/" />
    <meta property="og:title" content="SkillForge | Campus Peer Marketplace" />
    <meta property="og:description" content="Exchange skills, build projects, and grow your professional network within your campus community." />
    <meta property="og:image" content="%PUBLIC_URL%/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://skillforge.campus/" />
    <meta property="twitter:title" content="SkillForge | Campus Peer Marketplace" />
    <meta property="twitter:description" content="Exchange skills, build projects, and grow your professional network within your campus community." />
    <meta property="twitter:image" content="%PUBLIC_URL%/logo.png" />

    <title>SkillForge | Master Your Craft</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Premium Splash Screen -->
      <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-family: 'Outfit', sans-serif;">
        <div class="loader-container" style="position: relative; width: 80px; height: 80px;">
          <div style="box-sizing: border-box; display: block; position: absolute; width: 64px; height: 64px; margin: 8px; border: 6px solid #4F46E5; border-radius: 50%; animation: loader 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; border-color: #4F46E5 transparent transparent transparent;"></div>
          <div style="box-sizing: border-box; display: block; position: absolute; width: 64px; height: 64px; margin: 8px; border: 6px solid #4F46E5; border-radius: 50%; animation: loader 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; border-color: #4F46E5 transparent transparent transparent; animation-delay: -0.45s;"></div>
          <div style="box-sizing: border-box; display: block; position: absolute; width: 64px; height: 64px; margin: 8px; border: 6px solid #4F46E5; border-radius: 50%; animation: loader 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; border-color: #4F46E5 transparent transparent transparent; animation-delay: -0.3s;"></div>
          <div style="box-sizing: border-box; display: block; position: absolute; width: 64px; height: 64px; margin: 8px; border: 6px solid #4F46E5; border-radius: 50%; animation: loader 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; border-color: #4F46E5 transparent transparent transparent; animation-delay: -0.15s;"></div>
        </div>
        <h1 style="margin-top: 24px; font-size: 1.5rem; color: #1e293b; font-weight: 600; letter-spacing: -0.02em;">SkillForge</h1>
        <p style="margin-top: 8px; color: #64748b; font-size: 0.875rem;">Initializing peer marketplace...</p>
      </div>
      <style>
        @keyframes loader {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>
  </body>
</html>
